# =============================================================================
# DigiID — Render Blueprint (déploiement automatisé)
# =============================================================================
# Une fois ce fichier poussé sur GitHub :
# 1. Aller sur https://dashboard.render.com
# 2. "New Blueprint" → connecter le dépôt GitHub
# 3. Render détecte automatiquement render.yaml
# =============================================================================

services:

  # --------------------------------------------------------------------------
  # BACKEND — API FastAPI (Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: digiid-backend
    runtime: docker
    repo: https://github.com/nihadaboudou-max/DigiID.git
    dockerfilePath: backend/Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /api/v1/sante-leger
    envVars:
      # --- Application ---
      - key: ENVIRONNEMENT
        value: production
      - key: NOM_APPLICATION
        value: DigiID
      - key: VERSION_API
        value: "v1"
      - key: ACTIVER_DEBUG
        value: "false"

      # --- Sécurité (générées automatiquement) ---
      - key: CLE_SECRETE_JWT
        generateValue: true
      - key: CLE_CHIFFREMENT_DONNEES
        generateValue: true
      - key: ALGORITHME_JWT
        value: HS256
      - key: DUREE_TOKEN_ACCES_MINUTES
        value: "15"
      - key: DUREE_TOKEN_RAFRAICHISSEMENT_JOURS
        value: "7"

      # --- PostgreSQL (via databases:) ---
      - key: POSTGRES_HOST
        fromDatabase:
          name: digiid-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: digiid-db
          property: port
      - key: POSTGRES_UTILISATEUR
        fromDatabase:
          name: digiid-db
          property: user
      - key: POSTGRES_MOT_DE_PASSE
        fromDatabase:
          name: digiid-db
          property: password
      - key: POSTGRES_NOM_BASE
        fromDatabase:
          name: digiid-db
          property: database

            # --- Redis (commenté : pas de service Redis sur plan Free Render) ---
      # Si vous passez au plan Starter, décommentez et décommentez aussi le service keyvalue ci-dessus
      # - key: REDIS_HOST
      #   fromService:
      #     type: keyvalue
      #     name: digiid-redis
      #     property: host
      # - key: REDIS_PORT
      #   fromService:
      #     type: keyvalue
      #     name: digiid-redis
      #     property: port
      - key: REDIS_HOST
        value: "localhost"  # Fallback : pas de Redis, cache mémoire utilisé
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_MOT_DE_PASSE
        value: ""  # Pas de mot de passe en interne Render

      # --- LLM (Chatbot) ---
      - key: FOURNISSEUR_LLM
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODELE
        value: llama-3.3-70b-versatile

      # --- CORS / Frontend ---
      - key: ORIGINES_AUTORISEES
        value: https://digiid-frontend.onrender.com
      - key: URL_FRONTEND
        value: https://digiid-frontend.onrender.com

      # --- Monitoring ---
      - key: NIVEAU_JOURNAL
        value: INFO
      - key: SENTRY_DSN
        value: ""
      - key: ACTIVER_METRIQUES_PROMETHEUS
        value: "true"

      # --- Limitations ---
      - key: LIMITE_REQUETES_PAR_MINUTE_ANONYME
        value: "20"
      - key: LIMITE_REQUETES_PAR_MINUTE_AUTHENTIFIE
        value: "120"
      - key: LIMITE_REQUETES_PAR_MINUTE_ADMIN
        value: "300"

      # --- Seed super admin (PREMIÈRE CONNEXION) ---
      - key: SEED_SUPER_ADMIN_EMAIL
        value: admin@digiid.africa
      - key: SEED_SUPER_ADMIN_MOT_DE_PASSE
        sync: false
      - key: SEED_SUPER_ADMIN_PRENOM
        value: Super
      - key: SEED_SUPER_ADMIN_NOM
        value: Admin

            # --- 2FA ---
      # ⚠️ TEMPORAIREMENT DÉSACTIVÉ : le seed ne configure pas la 2FA pour le super admin.
      # Une fois connecté, réactiver via PATCH /api/v1/super-admin/configuration/feature-flags
      - key: ACTIVER_2FA_OBLIGATOIRE_ADMIN
        value: "false"
      - key: DUREE_VALIDITE_CODE_2FA_SECONDES
        value: "300"

            # --- Port d'écoute explicite ---
      - key: PORT
        value: "8000"

                        # --- Email (SMTP Gmail - mot de passe d'application) ---
      # 1. Activer la 2FA sur bigdataism2024@gmail.com
      # 2. Creer un mot de passe d'application : https://myaccount.google.com/apppasswords
      # 3. Definir SMTP_MOT_DE_PASSE sur le dashboard Render
      # (sync: false = Render ne genere pas la valeur automatiquement)
      - key: SMTP_MOT_DE_PASSE
        sync: false
      - key: EMAIL_EXPEDITEUR
        value: "DigiID <bigdataism2024@gmail.com>"

    # --------------------------------------------------------------------------
  # REDIS — Cache (type: keyvalue dans Render)
  # ❌ DÉSACTIVÉ : Render Free ne supporte pas les services keyvalue (Redis).
  # Le backend utilise un cache fallback en mémoire.
  # Pour activer Redis, passer au plan Starter ($7/mois) et décommenter :
  # - type: keyvalue
  #   name: digiid-redis
  #   plan: free
  #   region: frankfurt
  #   ipAllowList: []
  #   maxmemoryPolicy: allkeys-lru
  # --------------------------------------------------------------------------
  # FRONTEND — Next.js (Docker)
  # --------------------------------------------------------------------------
  - type: web
    name: digiid-frontend
    runtime: docker
    repo: https://github.com/nihadaboudou-max/DigiID.git
    dockerfilePath: Dockerfile.frontend
    plan: free
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_URL_BACKEND
        value: https://digiid-backend.onrender.com
      - key: URL_BACKEND
        fromService:
          type: web
          name: digiid-backend
          property: url

# --------------------------------------------------------------------------
# POSTGRESQL — Base de données managée
# --------------------------------------------------------------------------
databases:
  - name: digiid-db
    plan: free
    region: frankfurt
    ipAllowList: []
    postgresMajorVersion: 16
