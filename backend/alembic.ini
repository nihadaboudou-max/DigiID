# =============================================================================
# Configuration Alembic — migrations de base de données DigiID
# =============================================================================

[alembic]
# Dossier contenant les scripts de migration
script_location = alembic

# Format des noms de fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Encodage des fichiers générés
output_encoding = utf-8

# La vraie URL est lue dans env.py depuis les paramètres (pas dans ce fichier)
sqlalchemy.url = postgresql+psycopg2://user:pass@localhost/digiid

# =============================================================================
# Logging
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
